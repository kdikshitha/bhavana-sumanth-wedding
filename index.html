<!DOCTYPE html>
<html>
<head>
<title>Bhavana ❤️ Sumanth Wedding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY TEMPLE BACKGROUND ===== */
body {
  margin:0;
  font-family: 'Georgia', serif;
  text-align:center;
  color:#f5d28e;
  overflow-x:hidden;
  background: radial-gradient(circle at center, #5c0000 0%, #2b0000 40%, #000000 100%);
  background-attachment: fixed;
  animation: slowZoom 40s ease-in-out infinite alternate;
}

@keyframes slowZoom {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

/* Golden divine glow */
body::before {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, rgba(255,215,0,0.2), transparent 60%);
  pointer-events:none;
  z-index:-1;
}

/* ===== INTRO SCREEN ===== */
#intro {
  position:fixed;
  width:100%;
  height:100vh;
  background:#2b0000;
  color:gold;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#openBtn {
  margin-top:30px;
  padding:15px 35px;
  background:gold;
  border:none;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
}

/* ===== SECTION ANIMATION ===== */
.section {
  padding:100px 20px;
  opacity:0;
  transform: translateY(80px) scale(0.95);
  transition: all 1.5s ease;
}

.section.show {
  opacity:1;
  transform: translateY(0px) scale(1);
}

h1,h2 {
  color:gold;
  text-shadow:0 0 10px rgba(255,215,0,0.8);
}

/* ===== PHOTO STYLE ===== */
.photo-container {
  display:flex;
  justify-content:center;
  margin-top:40px;
}

.photo {
  width:300px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,215,0,0.8);
  animation: zoomSlow 15s infinite alternate ease-in-out;
}

@keyframes zoomSlow {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* ===== DIYAS ===== */
.diya {
  position: fixed;
  bottom: 20px;
  width: 80px;
  animation: flicker 1.5s infinite alternate;
}

.left-diya { left: 20px; }
.right-diya { right: 20px; }

@keyframes flicker {
  from { filter: brightness(1); }
  to { filter: brightness(1.3); }
}

/* ===== TEMPLE BG ===== */
.temple-bg {
  position: fixed;
  bottom: 0;
  width: 100%;
  opacity: 0.15;
  z-index: -2;
}

/* ===== PARTICLES ===== */
.particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  opacity: 0.8;
  animation: floatUp linear infinite;
  z-index: -1;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity:0; }
  to { transform: translateY(-10vh); opacity:1; }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>🪔 Wedding Invitation 🪔</h1>
  <h2>Bhavana ❤️ Sumanth</h2>
  <button id="openBtn" onclick="openInvite()">Tap to Open</button>
</div>

<!-- YOUTUBE MUSIC -->
<iframe id="bgMusicFrame"
width="0" height="0"
src="https://www.youtube.com/embed/ELDx-0S5IQM?autoplay=1&loop=1&playlist=ELDx-0S5IQM"
frameborder="0"
allow="autoplay">
</iframe>

<!-- SECTION 1 -->
<div class="section">
  <h2>With Divine Blessings</h2>
  <p>Daughter of ASHA & RANGANATH</p>
  <p>Son of R. KUMAR & G. VIJAYALAKSHMI</p>
  <h1>BHAVANA ❤️ SUMANTH</h1>
  <p>11th & 12th April 2026</p>
  <p>Sapthapadi Palace, Rajajinagar, Bangalore</p>
</div>

<!-- PHOTO 1 -->
<div class="section">
  <div class="photo-container">
    <img src="photo1.png" class="photo">
  </div>
</div>

<!-- PHOTO 2 -->
<div class="section">
  <div class="photo-container">
    <img src="photo2.png" class="photo">
  </div>
</div>

<!-- DIYAS -->
<img src="https://i.imgur.com/Np9GZ2M.png" class="diya left-diya">
<img src="https://i.imgur.com/Np9GZ2M.png" class="diya right-diya">

<!-- TEMPLE BG -->
<img src="https://i.imgur.com/8Km9tLL.png" class="temple-bg">

<script>

/* OPEN INVITE */
function openInvite(){
  document.getElementById("intro").style.display="none";
}

/* SCROLL REVEAL */
const sections = document.querySelectorAll(".section");

function revealSections() {
  const triggerBottom = window.innerHeight * 0.85;
  sections.forEach(section => {
    const sectionTop = section.getBoundingClientRect().top;
    if(sectionTop < triggerBottom){
      section.classList.add("show");
    }
  });
}

window.addEventListener("scroll", revealSections);
window.addEventListener("load", revealSections);

/* GOLD PARTICLES */
for (let i = 0; i < 40; i++) {
  let particle = document.createElement("div");
  particle.className = "particle";
  particle.style.left = Math.random() * 100 + "vw";
  particle.style.animationDuration = (5 + Math.random() * 10) + "s";
  particle.style.animationDelay = Math.random() * 5 + "s";
  document.body.appendChild(particle);
}

</script>

</body>
</html>
